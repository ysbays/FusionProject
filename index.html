<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>FusionOSINT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

[data-theme="dark"]{
--bg:#000;--content-bg:#0a0a0a;--bg2:#141414;--card:#1a1a1a;--card-h:#222;
--sidebar-bg:#000;--t1:#fff;--t2:#b8b8b8;--t3:#666;--border:#262626;--border-bright:#333;
--accent:#6366f1;--accent-m:rgba(99,102,241,.12);--accent-b:rgba(99,102,241,.3);
--tag-bg:rgba(255,255,255,.08);--tag-c:#ddd;--toggle-bg:#1a1a1a;--scroll:#333;
--btn-bg:#fff;--btn-color:#000;--green:#5cb885;--red:#ef4444;--orange:#f59e0b;
--overlay:rgba(0,0,0,.75);--pro:#f59e0b;--pro-bg:rgba(245,158,11,.1);--pro-border:rgba(245,158,11,.3);
--bot:#0088cc;--bot-bg:rgba(0,136,204,.1);--bot-border:rgba(0,136,204,.3);
}
[data-theme="light"]{
--bg:#eef0f4;--content-bg:#fff;--bg2:#f5f5f7;--card:#fff;--card-h:#fafafa;
--sidebar-bg:#f5f5f7;--t1:#000;--t2:#444;--t3:#888;--border:#dadada;--border-bright:#c0c0c0;
--accent:#4f46e5;--accent-m:rgba(79,70,229,.08);--accent-b:rgba(79,70,229,.2);
--tag-bg:rgba(0,0,0,.06);--tag-c:#333;--toggle-bg:#e0e0e0;--scroll:#bbb;
--btn-bg:#000;--btn-color:#fff;--green:#3a9d6b;--red:#dc2626;--orange:#d97706;
--overlay:rgba(0,0,0,.5);--pro:#d97706;--pro-bg:rgba(217,119,6,.08);--pro-border:rgba(217,119,6,.25);
--bot:#0077b5;--bot-bg:rgba(0,119,181,.08);--bot-border:rgba(0,119,181,.25);
}

body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .4s cubic-bezier(.4,0,.2,1),color .4s cubic-bezier(.4,0,.2,1)}
button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* ════════ ЗАГРУЗОЧНАЯ АНИМАЦИЯ ════════ */
#preloader{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s cubic-bezier(.4,0,.2,1),visibility .8s;
}
#preloader.hide{opacity:0;visibility:hidden;pointer-events:none}

.preloader-logo{
  width:90px;height:90px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-family:'Orbitron',sans-serif;font-size:2.5rem;
  margin-bottom:1.5rem;
  position:relative;
  animation:logoPulse 2s cubic-bezier(.4,0,.2,1) infinite;
  box-shadow:0 0 60px rgba(99,102,241,.4);
}
.preloader-logo::before{
  content:'';
  position:absolute;
  inset:-4px;
  border-radius:24px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  z-index:-1;
  filter:blur(20px);
  opacity:.5;
  animation:logoGlow 2s cubic-bezier(.4,0,.2,1) infinite;
}
@keyframes logoPulse{
  0%,100%{transform:scale(1) rotate(0deg)}
  50%{transform:scale(1.08) rotate(180deg)}
}
@keyframes logoGlow{
  0%,100%{opacity:.4;filter:blur(20px)}
  50%{opacity:.8;filter:blur(30px)}
}

.preloader-text{
  font-family:'Orbitron',sans-serif;
  font-size:1.4rem;
  font-weight:700;
  letter-spacing:6px;
  color:#fff;
  margin-bottom:.8rem;
  animation:textFade .8s cubic-bezier(.4,0,.2,1);
}
.preloader-text .accent{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.preloader-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;
  letter-spacing:4px;
  color:#666;
  margin-bottom:2rem;
  text-transform:uppercase;
  animation:textFade 1s cubic-bezier(.4,0,.2,1);
}

.preloader-bar{
  width:240px;
  height:3px;
  background:#1a1a1a;
  border-radius:3px;
  overflow:hidden;
  position:relative;
}
.preloader-bar-fill{
  height:100%;
  width:30%;
  background:linear-gradient(90deg,transparent,#6366f1,#8b5cf6,transparent);
  border-radius:3px;
  animation:barSlide 1.5s cubic-bezier(.4,0,.2,1) infinite;
}
@keyframes barSlide{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(400%)}
}
@keyframes textFade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.preloader-status{
  margin-top:1.2rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.65rem;
  color:#444;
  letter-spacing:2px;
  text-transform:uppercase;
  animation:statusBlink 1.5s ease-in-out infinite;
}
@keyframes statusBlink{
  0%,100%{opacity:1}
  50%{opacity:.4}
}

/* ════════ ОСНОВНОЙ САЙТ FADE-IN ════════ */
.app-wrapper{
  opacity:0;
  animation:appFadeIn .8s cubic-bezier(.4,0,.2,1) .3s forwards;
}
@keyframes appFadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ════════ HEADER ════════ */
.h{position:sticky;top:0;z-index:100;background:var(--sidebar-bg);border-bottom:1px solid var(--border);padding:0 1rem;transition:background .4s cubic-bezier(.4,0,.2,1)}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;gap:8px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.logo:hover{transform:translateY(-1px)}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-family:'Orbitron',sans-serif;font-size:.9rem;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.logo:hover .logo-icon{transform:rotate(10deg) scale(1.05)}
.logo-text{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1.5px;color:var(--t1);line-height:1}
.logo-sub{font-size:.45rem;color:var(--t3);letter-spacing:3px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-top:3px;font-weight:600}
.hr{display:flex;align-items:center;gap:.5rem}
.tt{width:38px;height:24px;border-radius:12px;background:var(--toggle-bg);border:1px solid var(--border);cursor:pointer;position:relative;flex-shrink:0;transition:all .25s cubic-bezier(.4,0,.2,1)}
.tt:hover{border-color:var(--accent-b)}
.td{width:18px;height:18px;border-radius:50%;background:var(--t1);position:absolute;top:2px;left:2px;transition:transform .35s cubic-bezier(.4,0,.2,1),background .3s;display:flex;align-items:center;justify-content:center;font-size:10px;pointer-events:none}
[data-theme="light"] .td{transform:translateX(14px)}

.user-btn{display:flex;align-items:center;gap:6px;background:var(--accent-m);border:1px solid var(--accent-b);border-radius:8px;padding:4px 10px 4px 4px;cursor:pointer;height:36px;color:var(--t1);font-weight:600;font-size:.8rem;font-family:'Inter',sans-serif;-webkit-appearance:none;flex-shrink:0;transition:all .25s cubic-bezier(.4,0,.2,1)}
.user-btn:hover{background:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.3)}
.user-btn .ua{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;font-family:'Orbitron',sans-serif;overflow:hidden;flex-shrink:0}
.user-btn .ua img{width:100%;height:100%;object-fit:cover}
.user-btn .un{max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-btn .pro-tag{background:var(--pro-bg);color:var(--pro);border:1px solid var(--pro-border);padding:1px 6px;border-radius:4px;font-size:.55rem;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.login-btn{background:var(--accent);color:#fff;border:none;padding:0 16px;height:36px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.8rem;font-family:'Inter',sans-serif;-webkit-appearance:none;flex-shrink:0;transition:all .25s cubic-bezier(.4,0,.2,1)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.4)}
.mt{display:none;background:var(--accent-m);border:1px solid var(--accent-b);border-radius:8px;color:var(--t1);font-size:1.2rem;cursor:pointer;padding:0 12px;-webkit-appearance:none;height:36px;align-items:center;font-family:'Inter',sans-serif;font-weight:600;transition:all .2s}

/* ════════ LAYOUT ════════ */
@media(min-width:901px){
  .mc{display:flex;min-height:calc(100vh - 58px)}
  .side{width:250px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;padding:1rem 0;transition:background .4s}
  .ct{flex:1;min-width:0;background:var(--content-bg);padding:2rem;border-left:1px solid var(--border);transition:background .4s}
  .ci{max-width:1100px;margin:0 auto}
  .mt,.mobile-menu{display:none}
}
@media(max-width:900px){
  .side{display:none}
  .mt{display:flex}
  .mobile-menu{display:block;background:var(--sidebar-bg);border-bottom:2px solid var(--border-bright);max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
  .mobile-menu.open{max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .mc{display:block}
  .ct{background:var(--content-bg);padding:1.2rem 1rem;min-height:calc(100vh - 58px);transition:background .4s}
}
@media(max-width:600px){
  .hi{height:52px;gap:4px}
  .logo-icon{width:32px;height:32px;font-size:.8rem}
  .logo-text{font-size:.88rem}
  .logo-sub{display:none}
  .user-btn .un{display:none}
  .user-btn{padding:3px}
  .login-btn{padding:0 12px;font-size:.75rem}
  .ct{padding:1rem .7rem}
}

/* ════════ ВКЛАДКА БОТА ════════ */
.bot-pinned{
  margin:.5rem 1.1rem 0;
  background:linear-gradient(135deg,var(--bot-bg),var(--accent-m));
  border:1px solid var(--bot-border);
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  display:flex;align-items:center;gap:9px;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}
.bot-pinned::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,transparent,rgba(99,102,241,.1),transparent);
  transform:translateX(-100%);
  transition:transform .6s cubic-bezier(.4,0,.2,1);
}
.bot-pinned:hover{
  border-color:var(--bot);
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(0,136,204,.15);
}
.bot-pinned:hover::before{transform:translateX(100%)}
.bot-pinned-icon{
  width:32px;height:32px;
  background:linear-gradient(135deg,#0088cc,#00a8ff);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,136,204,.3);
}
.bot-pinned-info{flex:1;min-width:0;line-height:1.2;position:relative;z-index:1}
.bot-pinned-name{font-size:.82rem;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:5px}
.bot-pinned-tag{
  background:var(--bot);color:#fff;
  font-size:.5rem;font-weight:700;
  padding:1px 5px;border-radius:3px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.5px;
}
.bot-pinned-desc{font-size:.66rem;color:var(--t2);margin-top:1px;font-weight:500}
.bot-pinned-arrow{
  color:var(--bot);font-size:.85rem;font-weight:700;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  position:relative;z-index:1;
}
.bot-pinned:hover .bot-pinned-arrow{transform:translateX(3px)}

/* ════════ MENU ITEMS ════════ */
.st{padding:.6rem 1.1rem .3rem;font-size:.58rem;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:11px 1.1rem;cursor:pointer;border-left:3px solid transparent;font-size:.86rem;color:var(--t2);min-height:44px;font-weight:500;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative}
.ni::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:0;
  background:linear-gradient(90deg,var(--accent-m),transparent);
  transition:width .25s cubic-bezier(.4,0,.2,1);
  z-index:-1;
}
.ni:hover::before{width:100%}
.ni:active{background:var(--accent-m);color:var(--t1)}
.ni.a{background:var(--accent-m);color:var(--t1);border-left-color:var(--accent);font-weight:600}
.ni .ic{font-size:1rem;width:22px;text-align:center;flex-shrink:0;pointer-events:none}
.ni .nm{flex:1;pointer-events:none}
.ni .b{margin-left:auto;background:var(--accent-m);color:var(--t2);padding:2px 7px;border-radius:7px;font-size:.6rem;font-family:'JetBrains Mono',monospace;font-weight:700;flex-shrink:0;pointer-events:none}
.ni .pro-lock{margin-left:auto;color:var(--pro);font-size:.65rem;pointer-events:none;font-weight:700}
.sd{height:1px;background:var(--border);margin:.4rem 1.1rem}

/* ════════ CONTENT ════════ */
.ph{margin-bottom:1.3rem;padding-bottom:1rem;border-bottom:1px solid var(--border);animation:slideDown .5s cubic-bezier(.4,0,.2,1)}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.ph h1{font-size:1.4rem;font-weight:700;margin-bottom:.3rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bc{font-size:.7rem;color:var(--t3);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px}
.bc a{color:var(--t2);text-decoration:none;cursor:pointer;transition:color .2s}
.bc a:hover{color:var(--t1)}
.spi{font-family:'JetBrains Mono',monospace;font-size:.73rem;color:var(--t3);margin-bottom:1.1rem;display:inline-block;padding:5px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}

.stb{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.6rem;margin-bottom:1.2rem;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .1s both}
.sc{background:var(--card);border:1px solid var(--border-bright);border-radius:10px;padding:.9rem;display:flex;align-items:center;gap:.7rem;transition:all .25s cubic-bezier(.4,0,.2,1)}
.sc:hover{transform:translateY(-2px);border-color:var(--accent-b);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.sc .si2{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:var(--accent-m);flex-shrink:0;border:1px solid var(--border)}
.sc .sn{font-size:1.2rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--t1);line-height:1}
.sc .sd2{font-size:.65rem;color:var(--t2);margin-top:2px;font-weight:500}

@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:.7rem;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .15s both}
.tc{background:var(--card);border:1px solid var(--border-bright);border-radius:10px;padding:1rem;transition:all .25s cubic-bezier(.4,0,.2,1)}
.tc:hover{background:var(--card-h);border-color:var(--accent-b);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.th{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.4rem;gap:6px}
.tn{font-size:.88rem;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:5px;min-width:0}
.tn .te{font-size:1rem;flex-shrink:0}
.tg2{padding:2px 7px;border-radius:5px;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;font-family:'JetBrains Mono',monospace;flex-shrink:0;background:var(--tag-bg);color:var(--tag-c);border:1px solid var(--border)}
.td2{font-size:.8rem;color:var(--t2);line-height:1.45;margin-bottom:.7rem}
.tft{display:flex;align-items:center;justify-content:space-between;gap:6px;padding-top:.5rem;border-top:1px solid var(--border)}
.tl{color:var(--t1);text-decoration:none;font-size:.76rem;font-weight:600;padding:5px 9px;margin:-5px -9px;border-radius:5px;transition:all .2s cubic-bezier(.4,0,.2,1)}
.tl:hover{background:var(--accent-m);color:var(--accent);transform:translateX(2px)}
.tm{font-size:.6rem;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:600}

.hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.6rem;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .2s both}
.hc{background:var(--card);border:1px solid var(--border-bright);border-radius:10px;padding:.9rem;cursor:pointer;min-height:58px;display:flex;flex-direction:column;justify-content:center;transition:all .25s cubic-bezier(.4,0,.2,1)}
.hc:hover{background:var(--card-h);border-color:var(--accent-b);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.hct{font-size:.83rem;font-weight:700;margin-bottom:.2rem}
.hcc{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--t2);font-weight:600}

.sec{display:none}
.sec.a{display:block;animation:secFade .35s cubic-bezier(.4,0,.2,1)}
@keyframes secFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ════════ BOT PAGE ════════ */
.bot-hero{
  background:linear-gradient(135deg,var(--bot-bg),var(--accent-m));
  border:1px solid var(--bot-border);
  border-radius:14px;padding:1.8rem;
  display:flex;gap:1.5rem;align-items:center;margin-bottom:1.5rem;
  animation:fadeUp .5s cubic-bezier(.4,0,.2,1);
}
.bot-hero-img{
  width:120px;height:120px;border-radius:18px;
  background:linear-gradient(135deg,#0088cc,#00a8ff);
  display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;flex-shrink:0;
  box-shadow:0 8px 24px rgba(0,136,204,.3);
}
.bot-hero-info{flex:1;min-width:0}
.bot-hero-info h2{font-size:1.4rem;font-weight:700;margin-bottom:.4rem;font-family:'Orbitron',sans-serif;letter-spacing:1px}
.bot-tag{display:inline-block;padding:4px 12px;background:var(--bot);color:#fff;border-radius:20px;font-size:.65rem;font-family:'JetBrains Mono',monospace;margin-bottom:.7rem;letter-spacing:1px;font-weight:700}
.bot-hero-info p{color:var(--t2);font-size:.85rem;line-height:1.55;margin-bottom:.8rem}
.bot-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 26px;background:var(--bot);color:#fff;
  border:none;border-radius:9px;font-weight:700;font-size:.88rem;
  cursor:pointer;text-decoration:none;-webkit-appearance:none;min-height:44px;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 4px 12px rgba(0,136,204,.3);
}
.bot-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,136,204,.4)}

.bot-features{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.7rem;margin-top:1.3rem}
.bot-feat{
  background:var(--card);border:1px solid var(--border-bright);
  border-radius:10px;padding:1.1rem;
  transition:all .25s cubic-bezier(.4,0,.2,1);
}
.bot-feat:hover{transform:translateY(-2px);border-color:var(--bot-border);box-shadow:0 4px 12px rgba(0,136,204,.1)}
.bot-feat-icon{font-size:1.5rem;margin-bottom:.5rem}
.bot-feat-title{font-size:.85rem;font-weight:700;margin-bottom:.3rem;color:var(--t1)}

/* ════════ PAYWALL ════════ */

function buildMenuHTML(){
  let sh = '';
  cats.forEach((g, gi) => {
    sh += `<div class="st">${g.s}</div>`;
    g.items.forEach(i => {
      let cnt = i.c === 'all' ? totalTools : (D[i.id]?.tools.length || '');
      const isProCategory = D[i.id]?.pro;
      const proLock = isProCategory && !isPro();
      sh += `<div class="ni${i.id === 'home' ? ' a' : ''}" onclick="go('${i.id}')" data-s="${i.id}">
        <span class="ic">${i.ic}</span><span class="nm">${i.n}</span>
        ${proLock ? '<span class="pro-lock">🔒 PRO</span>' : (cnt !== '' ? `<span class="b">${cnt}</span>` : '')}
      </div>`;
      if (i.id === 'home') {
        sh += `<div class="bot-pinned" onclick="go('project')">
          <div class="bot-pinned-icon">🤖</div>
          <div class="bot-pinned-info">
            <div class="bot-pinned-name">SpectraOSINT <span class="bot-pinned-tag">BOT</span></div>
            <div class="bot-pinned-desc">Телеграм-бот с 5000+ инструментами</div>
          </div>
          <div class="bot-pinned-arrow">›</div>
        </div>`;
      }
    });
    if (gi < cats.length - 1) sh += '<div class="sd"></div>';
  });
  if (isAdmin()) {
    sh += '<div class="sd"></div>';
    sh += '<div class="st">Администрирование</div>';
    sh += `<div class="ni" onclick="go('admin')" data-s="admin"><span class="ic">⚙️</span><span class="nm">Админ-панель</span></div>`;
  }
  return sh;
}

window.doLogin = async function(){

  const password = document.getElementById('authPassword').value;

  if (!email || !password) return showMsg('Заполните все поля');

window.doRegister = async function(){
  const name = document.getElementById('authName').value.trim();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('regBtn');
  if (!name || !email || !password) return showMsg('Заполните все поля');
  if (password.length < 6) return showMsg('Пароль минимум 6 символов');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>'; clearMsg();
  try {
    const uc = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(uc.user, { displayName: name });
    try { await setDoc(doc(db, 'users', uc.user.uid), { name, email, createdAt: serverTimestamp(), role: 'user', pro: false, provider: 'email', lastLogin: serverTimestamp() }) } catch(e) { console.warn(e) }
    try { await sendEmailVerification(uc.user) } catch(e) {}
    closeAuthModal();
  } catch(e) { showMsg(trErr(e.code)); btn.disabled = false; btn.innerHTML = 'Создать аккаунт' }
};

  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>'; clearMsg();

    showCodeForm(phone);
  } catch(e) { showMsg(trErr(e.code)); btn.disabled = false; btn.innerHTML = 'Отправить код' }
};

window.verifyCode = async function(){
  const code = document.getElementById('authCode').value.trim();
  if (!code) return showMsg('Введите код');
  const btn = document.getElementById('verifyBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>'; clearMsg();
  try {
    const result = await confirmationResult.confirm(code);
    const user = result.user;
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (!userDoc.exists()) {
        await setDoc(doc(db, 'users', user.uid), {
          name: user.displayName || user.phoneNumber,
          phone: user.phoneNumber, email: user.email || '',
          createdAt: serverTimestamp(),
          role: 'user', pro: false, provider: 'phone', lastLogin: serverTimestamp()
        });
      }
    } catch(e) { console.warn(e) }
    closeAuthModal();
  } catch(e) { showMsg(trErr(e.code)); btn.disabled = false; btn.innerHTML = 'Подтвердить' }
};

window.doGoogleLogin = async function(){
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const user = result.user;
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (!userDoc.exists()) {
        await setDoc(doc(db, 'users', user.uid), { name: user.displayName, email: user.email, photoURL: user.photoURL, createdAt: serverTimestamp(), role: 'user', pro: false, provider: 'google', lastLogin: serverTimestamp() });
      } else {
        await updateDoc(doc(db, 'users', user.uid), { lastLogin: serverTimestamp() });
      }
    } catch(e) { console.warn(e) }
    closeAuthModal();
  } catch(e) { if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') showMsg(trErr(e.code)) }
};

      const provIcon = { google: '🟢', phone: '📱', email: '📧' }[provider] || '📧';
      
      html += `<tr data-search="${(name + email).toLowerCase()}">
        <td><strong>${name}</strong><br><span style="font-size:.7rem;color:var(--t3)">${email}</span><br><span style="font-size:.6rem;color:var(--t3)">ID: ${u.uid.slice(0, 10)}...</span><br><span style="font-size:.6rem;color:var(--t3)">Был: ${lastLogin}</span></td>
        <td><span class="admin-badge role-${u.role || 'user'}">${u.role || 'user'}</span></td>
        <td><span class="admin-badge pro-${u.pro ? 'yes' : 'no'}">${u.pro ? '✅ PRO' : '—'}</span></td>
        <td>${provIcon}</td>
        <td style="font-size:.75rem;white-space:nowrap">${date}</td>
        <td>
          <button class="admin-action" onclick="adminTogglePro('${u.uid}', ${!u.pro})">${u.pro ? 'Забрать PRO' : 'Выдать PRO'}</button>
          <button class="admin-action ${u.role === 'admin' ? 'danger' : ''}" onclick="adminToggleRole('${u.uid}', '${u.role === 'admin' ? 'user' : 'admin'}')">${u.role === 'admin' ? 'Убрать админа' : 'Сделать админом'}</button>
        </td>
      </tr>`;
    });
    
    html += `</tbody></table></div>`;
    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = `<p style="color:var(--red)">Ошибка: ${e.message}</p><p style="font-size:.8rem;color:var(--t3);margin-top:.5rem">Проверьте правила Firestore.</p>`;
  }
};

window.filterAdminTable = function(q){
  document.querySelectorAll('#adminTable tbody tr').forEach(r => {
    r.style.display = r.dataset.search.includes(q.toLowerCase()) ? '' : 'none';
  });
};

window.adminTogglePro = async function(uid, value){
  if (!confirm(`${value ? 'Выдать' : 'Забрать'} PRO подписку?`)) return;
  try { await updateDoc(doc(db, 'users', uid), { pro: value }); loadAdminPanel() } catch(e) { alert('Ошибка: ' + e.message) }
};

window.adminToggleRole = async function(uid, role){
  if (!confirm(`Изменить роль на "${role}"?`)) return;
  try {
    await updateDoc(doc(db, 'users', uid), { role });
    loadAdminPanel();
    if (uid === auth.currentUser?.uid) { currentUserData.role = role; rebuildMenus(); buildContent() }
  } catch(e) { alert('Ошибка: ' + e.message) }
};

function updateUserArea(user){
  if (user) {
    const name = user.displayName || user.email?.split('@')[0] || user.phoneNumber || 'User';
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    userArea.innerHTML = `
      <button class="user-btn" onclick="openAuthModal('profile')">
        ${user.photoURL ? `<div class="ua"><img src="${user.photoURL}" alt=""></div>` : `<div class="ua">${initials}</div>`}
        <span class="un">${name}</span>
        ${currentUserData?.pro ? '<span class="pro-tag">PRO</span>' : ''}
      </button>
    `;
  } else {
    userArea.innerHTML = `<button class="login-btn" onclick="openAuthModal('login')">Войти</button>`;
  }
}

onAuthStateChanged(auth, async (user) => {
  window.currentUser = user;
  
  if (user) {
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists()) {
        window.currentUserData = userDoc.data();
      } else {
        const newData = {
          name: user.displayName || user.email?.split('@')[0] || user.phoneNumber,
          email: user.email || '', phone: user.phoneNumber || '',
          photoURL: user.photoURL || '',
          createdAt: serverTimestamp(), lastLogin: serverTimestamp(),
          role: 'user', pro: false,
          provider: user.providerData[0]?.providerId || 'email'
        };
        await setDoc(doc(db, 'users', user.uid), newData);
        window.currentUserData = newData;
      }
      try { await updateDoc(doc(db, 'users', user.uid), { lastLogin: serverTimestamp() }) } catch(e) {}
    } catch(e) {
      console.warn(e);
      window.currentUserData = { role: 'user', pro: false };
    }
  } else {
    window.currentUserData = null;
  }
  
  updateUserArea(user);
  rebuildMenus();
  buildContent();
});
</script>
</body>
</html>
